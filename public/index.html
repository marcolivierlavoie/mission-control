<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control v2 - OpenClaw Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .view-switch {
            display: inline-flex;
            gap: 0.35rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 0.25rem;
        }

        .tab-btn {
            border: none;
            background: transparent;
            color: #b8c5d0;
            padding: 0.35rem 0.65rem;
            border-radius: 7px;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .tab-btn.active {
            color: #fff;
            background: rgba(0, 168, 232, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4aa, #00a8e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.3);
            font-size: 0.85rem;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d4aa;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            border: 1px solid rgba(0, 168, 232, 0.4);
            background: rgba(0, 168, 232, 0.15);
            color: #d6f6ff;
            border-radius: 10px;
            padding: 0.45rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(0, 168, 232, 0.25);
            border-color: rgba(0, 168, 232, 0.7);
        }

        .btn.primary {
            border-color: rgba(0, 212, 170, 0.4);
            background: rgba(0, 212, 170, 0.18);
            color: #defff8;
        }

        .btn.primary:hover {
            background: rgba(0, 212, 170, 0.3);
            border-color: rgba(0, 212, 170, 0.75);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #00d4aa, #00a8e8);
            border-radius: 2px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 1rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
            font-size: 0.9rem;
        }

        .info-value {
            color: #fff;
            font-weight: 500;
            font-family: 'SF Mono', monospace;
            font-size: 0.9rem;
            text-align: right;
            word-break: break-word;
        }

        .model-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 168, 232, 0.15);
            border: 1px solid rgba(0, 168, 232, 0.3);
            border-radius: 12px;
            font-size: 0.8rem;
            margin: 0.25rem;
        }

        .model-tag.default {
            background: rgba(0, 212, 170, 0.15);
            border-color: rgba(0, 212, 170, 0.3);
        }

        .skill-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .skill-category {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }

        .skill-category.agent { background: rgba(0, 212, 170, 0.2); }
        .skill-category.workspace { background: rgba(0, 168, 232, 0.2); }
        .skill-category.system { background: rgba(149, 128, 255, 0.2); }

        .cron-job {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .cron-job:last-child {
            margin-bottom: 0;
        }

        .cron-head {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.45rem;
        }

        .cron-name {
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cron-status {
            font-size: 0.72rem;
            border-radius: 10px;
            padding: 0.15rem 0.45rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .cron-status.ok {
            color: #00d4aa;
            border-color: rgba(0, 212, 170, 0.4);
            background: rgba(0, 212, 170, 0.12);
        }

        .cron-status.error {
            color: #ff7c7c;
            border-color: rgba(255, 100, 100, 0.35);
            background: rgba(255, 100, 100, 0.12);
        }

        .cron-desc {
            color: #a9a9b3;
            font-size: 0.8rem;
            margin-bottom: 0.6rem;
            line-height: 1.35;
        }

        .cron-meta {
            display: grid;
            grid-template-columns: 100px 1fr;
            font-size: 0.78rem;
            gap: 0.2rem 0.7rem;
        }

        .cron-meta .k {
            color: #7f7f8f;
        }

        .cron-meta .v {
            color: #d8d8e2;
            font-family: 'SF Mono', monospace;
            word-break: break-word;
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(8, 8, 20, 0.72);
            z-index: 20;
            padding: 1.5rem;
        }

        .overlay.open {
            display: flex;
        }

        .modal {
            width: min(760px, 100%);
            max-height: min(86vh, 760px);
            overflow-y: auto;
            background: rgba(25, 25, 46, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.45);
            padding: 1.3rem;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .settings-group {
            margin-bottom: 1.3rem;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }

        .settings-group h3 {
            font-size: 0.95rem;
            margin-bottom: 0.7rem;
            color: #f8f8ff;
        }

        .model-select {
            width: 100%;
            padding: 0.6rem 0.7rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(8, 8, 18, 0.6);
            color: #fff;
            outline: none;
        }

        .plugin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .plugin-row:last-child {
            border-bottom: none;
        }

        .switch {
            width: 38px;
            height: 22px;
            position: relative;
            display: inline-block;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            cursor: pointer;
            background: rgba(255,255,255,0.18);
            transition: 0.2s;
        }

        .slider::before {
            content: '';
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        .switch input:checked + .slider {
            background: linear-gradient(135deg, #00d4aa, #00a8e8);
        }

        .switch input:checked + .slider::before {
            transform: translateX(16px);
        }

        .settings-message {
            min-height: 1.1rem;
            font-size: 0.83rem;
            color: #94f5dd;
            margin-top: 0.3rem;
        }

        .settings-message.error {
            color: #ff8f8f;
        }

        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4aa, #00a8e8);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 168, 232, 0.4);
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
        }

        .error {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 8px;
            padding: 1rem;
            color: #ff6464;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 1rem;
        }

        .agent-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 1rem;
        }

        .agent-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            gap: 0.75rem;
        }

        .agent-name {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
        }

        .health-badge {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            border-radius: 10px;
            padding: 0.2rem 0.45rem;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .health-badge.healthy, .health-badge.running { color: #00d4aa; border-color: rgba(0,212,170,0.45); }
        .health-badge.degraded { color: #ff8b8b; border-color: rgba(255,100,100,0.45); }
        .health-badge.unknown { color: #aeb3c7; border-color: rgba(174,179,199,0.35); }

        .risk {
            font-size: 0.72rem;
            border-radius: 10px;
            padding: 0.2rem 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .risk.high { color: #ff8d8d; background: rgba(255,100,100,0.12); border: 1px solid rgba(255,100,100,0.4); }
        .risk.medium { color: #ffd27f; background: rgba(255,190,90,0.12); border: 1px solid rgba(255,190,90,0.4); }
        .risk.low { color: #9ee6ff; background: rgba(0,168,232,0.12); border: 1px solid rgba(0,168,232,0.4); }

        .tool-chip {
            display: inline-block;
            font-size: 0.72rem;
            margin: 0.2rem 0.2rem 0 0;
            padding: 0.15rem 0.4rem;
            border-radius: 9px;
            border: 1px solid rgba(255,255,255,0.18);
            color: #d6d6de;
            font-family: 'SF Mono', monospace;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin: 0.3rem 0 0.9rem;
        }

        .section-title h3 {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
        }

        .section-title .hint {
            color: #8e95ab;
            font-size: 0.78rem;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.7rem;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-height: 88px;
            text-align: left;
            padding: 0.8rem;
        }

        .action-btn .label {
            font-weight: 600;
            color: #fff;
        }

        .action-btn .meta {
            font-size: 0.74rem;
            color: #a8b0c4;
            line-height: 1.35;
        }

        .action-btn.danger {
            border-color: rgba(255, 124, 124, 0.45);
            background: rgba(255, 124, 124, 0.12);
            color: #ffe7e7;
        }

        .action-btn.danger:hover {
            background: rgba(255, 124, 124, 0.2);
        }

        .action-btn.neutral {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
        }

        .panel-stack {
            display: grid;
            gap: 1rem;
        }

        .session-list {
            display: grid;
            gap: 0.7rem;
        }

        .session-item {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .session-main {
            min-width: 0;
        }

        .session-name {
            color: #fff;
            font-weight: 600;
            font-size: 0.94rem;
            margin-bottom: 0.2rem;
        }

        .session-sub {
            color: #8f97ad;
            font-size: 0.76rem;
            line-height: 1.35;
        }

        .session-actions {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 0.72rem;
            color: #d8dfea;
            background: rgba(255,255,255,0.04);
        }

        .pill.good { color: #8ff0d4; border-color: rgba(0,212,170,0.35); background: rgba(0,212,170,0.1); }
        .pill.warn { color: #ffd58b; border-color: rgba(255,194,76,0.35); background: rgba(255,194,76,0.08); }
        .pill.bad { color: #ff9f9f; border-color: rgba(255,124,124,0.35); background: rgba(255,124,124,0.08); }

        .input-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.65rem;
            margin-bottom: 0.75rem;
        }

        .field {
            width: 100%;
            border-radius: 10px;
            padding: 0.65rem 0.8rem;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(10, 12, 22, 0.68);
            color: #eef4ff;
            outline: none;
        }

        .field::placeholder {
            color: #778097;
        }

        .field:focus {
            border-color: rgba(0, 212, 170, 0.45);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.12);
        }

        .search-results {
            display: grid;
            gap: 0.65rem;
            max-height: 340px;
            overflow: auto;
        }

        .memory-entry {
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
        }

        .memory-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .memory-snippet {
            color: #a4acc0;
            font-size: 0.82rem;
            line-height: 1.45;
            margin-bottom: 0.35rem;
        }

        .progress-list {
            display: grid;
            gap: 0.8rem;
        }

        .progress-row {
            display: grid;
            gap: 0.4rem;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            font-size: 0.8rem;
            color: #a4acc0;
        }

        .progress-track {
            height: 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #00d4aa, #00a8e8);
            box-shadow: 0 0 18px rgba(0, 168, 232, 0.35);
        }

        .progress-fill.warn {
            background: linear-gradient(90deg, #ffc866, #ff7c7c);
        }

        .timeline-list {
            display: grid;
            gap: 0.65rem;
        }

        .timeline-day {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 0.85rem;
            padding: 0.85rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .timeline-day .date {
            color: #fff;
            font-weight: 600;
            font-size: 0.92rem;
        }

        .timeline-day .status {
            margin-top: 0.25rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .timeline-day .status.healthy { color: #8ff0d4; }
        .timeline-day .status.degraded { color: #ff9f9f; }
        .timeline-day .status.idle { color: #aeb5c7; }

        .timeline-events {
            color: #a7afc2;
            font-size: 0.8rem;
            line-height: 1.45;
        }

        .alert-list {
            display: grid;
            gap: 0.65rem;
        }

        .alert-item {
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
        }

        .alert-item.critical {
            border-color: rgba(255,124,124,0.35);
            background: rgba(255,124,124,0.08);
        }

        .alert-item.warning {
            border-color: rgba(255,198,90,0.35);
            background: rgba(255,198,90,0.08);
        }

        .alert-item.info {
            border-color: rgba(0,168,232,0.25);
            background: rgba(0,168,232,0.06);
        }

        .alert-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.35rem;
        }

        .alert-title {
            color: #fff;
            font-weight: 600;
        }

        .alert-detail {
            color: #a6aec0;
            font-size: 0.8rem;
            line-height: 1.45;
        }

        .sandbox-grid {
            display: grid;
            gap: 0.8rem;
        }

        .sandbox-output {
            padding: 0.85rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(8, 10, 18, 0.7);
            color: #dfe6f5;
            font-family: 'SF Mono', monospace;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 120px;
        }

        .toast-stack {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: grid;
            gap: 0.6rem;
            z-index: 60;
            pointer-events: none;
        }

        .toast {
            max-width: 340px;
            padding: 0.75rem 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(20, 22, 38, 0.92);
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.32);
            color: #f4f8ff;
            font-size: 0.85rem;
        }

        .toast.success { border-color: rgba(0,212,170,0.3); }
        .toast.error { border-color: rgba(255,124,124,0.3); }
        .toast.info { border-color: rgba(0,168,232,0.3); }

        .muted {
            color: #8f97ad;
            font-size: 0.8rem;
        }

        .inline-kbd {
            font-family: 'SF Mono', monospace;
            font-size: 0.76rem;
            padding: 0.12rem 0.35rem;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
        }

        /* Activity panel */
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .activity-status-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .activity-status-row:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .activity-dot.alive { background: #00d4aa; animation: pulse 2s infinite; }
        .activity-dot.dead { background: #ff6464; }
        .activity-dot.idle { background: #8f97ad; }
        .activity-dot.thinking { background: #7c83ff; animation: pulse 1.2s infinite; }
        .activity-dot.working { background: #ffd166; animation: pulse 0.8s infinite; }
        .activity-dot.unknown { background: #555; }

        .activity-label {
            color: #888;
            font-size: 0.85rem;
            min-width: 110px;
        }

        .activity-value {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .activity-value.alive { color: #00d4aa; }
        .activity-value.dead { color: #ff6464; }
        .activity-value.idle { color: #8f97ad; }
        .activity-value.thinking { color: #7c83ff; }
        .activity-value.working { color: #ffd166; }

        .activity-message-box {
            background: rgba(8, 10, 18, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            font-family: 'SF Mono', monospace;
            font-size: 0.8rem;
            color: #c8d4e8;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .activity-message-box.empty {
            color: #555;
            font-style: italic;
            font-family: inherit;
        }

        .activity-tmux-output {
            background: rgba(6, 8, 16, 0.85);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
            color: #a0b0c0;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 320px;
            overflow-y: auto;
        }

        .activity-refresh-note {
            font-size: 0.75rem;
            color: #666;
            text-align: right;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦞 Mission Control v2</h1>
            <div class="header-actions">
                <div class="view-switch">
                    <button id="tabDashboard" class="tab-btn active" onclick="setView('dashboard')">Dashboard</button>
                    <button id="tabAgents" class="tab-btn" onclick="setView('agents')">Agents</button>
                    <button id="tabActivity" class="tab-btn" onclick="setView('activity')">Activity</button>
                </div>
                <span class="status-badge">Connected</span>
                <button class="btn" onclick="openSettings()">Settings</button>
            </div>
        </header>

        <div id="content">
            <div class="loading">Loading your OpenClaw configuration...</div>
        </div>
    </div>

    <div id="toastStack" class="toast-stack"></div>

    <div id="settingsOverlay" class="overlay" onclick="closeSettings(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">Settings</div>
                <button class="btn" onclick="closeSettings()">Close</button>
            </div>

            <div class="settings-group">
                <h3>Default Model</h3>
                <select id="defaultModelSelect" class="model-select"></select>
                <div style="margin-top:0.7rem;display:flex;justify-content:flex-end;">
                    <button class="btn primary" onclick="saveDefaultModel()">Save model</button>
                </div>
            </div>

            <div class="settings-group">
                <h3>Plugins</h3>
                <div id="pluginToggleList"></div>
            </div>

            <div id="settingsMessage" class="settings-message"></div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadData()">↻</button>

    <script>
        let dashboardData = {
            status: null,
            models: [],
            plugins: [],
            skills: [],
            cron: { jobs: [], count: 0 },
            agents: [],
            sessionsActive: { sessions: [] },
            memory: { entries: [], recent: [], count: 0 },
            limits: { metrics: [] },
            timeline: { days: [] },
            alerts: [],
            memoryQuery: '',
            sandboxWebQuery: '',
            sandboxExecCommand: 'node -v',
            ready: false
        };
        let activityData = null;
        let currentView = 'dashboard';
        let pollTimer = null;
        let activityPollTimer = null;
        let memorySearchTimer = null;
        let sandboxOutput = '';

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatTimestamp(ms) {
            if (!ms || Number.isNaN(Number(ms))) return 'Never';
            const d = new Date(Number(ms));
            if (Number.isNaN(d.getTime())) return 'Invalid date';
            return d.toLocaleString();
        }

        function formatTimeUntil(ms) {
            if (!ms || Number.isNaN(Number(ms))) return 'unknown';
            const delta = Number(ms) - Date.now();
            const abs = Math.abs(delta);
            const hours = Math.floor(abs / 3600000);
            const mins = Math.round((abs % 3600000) / 60000);
            const text = hours ? `${hours}h ${mins}m` : `${mins}m`;
            return delta >= 0 ? `in ${text}` : `${text} overdue`;
        }

        function formatRelativeTime(ms) {
            if (!ms || Number.isNaN(Number(ms))) return 'unknown';
            const delta = Date.now() - Number(ms);
            const abs = Math.abs(delta);
            const mins = Math.round(abs / 60000);
            const hours = Math.round(abs / 3600000);
            if (abs < 60000) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            if (hours < 48) return `${hours}h ago`;
            return `${Math.round(abs / 86400000)}d ago`;
        }

        function cronStatusClass(status) {
            const value = String(status || '').toLowerCase();
            if (value.includes('success') || value === 'ok') return 'ok';
            if (value.includes('fail') || value.includes('error')) return 'error';
            return '';
        }

        function setHeaderStatus(text, tone = 'default') {
            const badge = document.querySelector('.status-badge');
            if (!badge) return;
            badge.textContent = text;
            badge.style.background = tone === 'error'
                ? 'rgba(255, 100, 100, 0.14)'
                : tone === 'warn'
                    ? 'rgba(255, 198, 90, 0.14)'
                    : 'rgba(0, 212, 170, 0.1)';
            badge.style.borderColor = tone === 'error'
                ? 'rgba(255, 100, 100, 0.3)'
                : tone === 'warn'
                    ? 'rgba(255, 198, 90, 0.3)'
                    : 'rgba(0, 212, 170, 0.3)';
        }

        function showToast(message, type = 'info') {
            const stack = document.getElementById('toastStack');
            if (!stack) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            stack.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-6px)';
                toast.style.transition = 'opacity 220ms ease, transform 220ms ease';
                setTimeout(() => toast.remove(), 240);
            }, 3000);
        }

        async function apiJson(url, options = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            let data = null;
            try {
                data = await res.json();
            } catch {
                data = null;
            }
            if (!res.ok) {
                throw new Error(data?.error || data?.message || `Request failed (${res.status})`);
            }
            return data;
        }

        function setView(view) {
            currentView = view;
            document.getElementById('tabDashboard').classList.toggle('active', view === 'dashboard');
            document.getElementById('tabAgents').classList.toggle('active', view === 'agents');
            document.getElementById('tabActivity').classList.toggle('active', view === 'activity');
            if (view === 'activity') {
                startActivityPolling();
                loadActivity();
            } else {
                stopActivityPolling();
            }
            renderActiveView();
        }

        function renderActiveView() {
            if (currentView === 'activity') {
                renderActivityPage(activityData);
                return;
            }
            if (!dashboardData.ready) return;
            if (currentView === 'agents') {
                renderAgentsPage(dashboardData.agents || []);
                return;
            }
            renderDashboard(
                dashboardData.status,
                dashboardData.models,
                dashboardData.plugins,
                dashboardData.skills,
                dashboardData.cron,
                dashboardData.sessionsActive,
                dashboardData.memory,
                dashboardData.limits,
                dashboardData.timeline,
                dashboardData.alerts,
                dashboardData.usage
            );
        }

        function showSettingsMessage(text, isError = false) {
            const el = document.getElementById('settingsMessage');
            el.textContent = text || '';
            el.className = `settings-message${isError ? ' error' : ''}`;
        }

        function renderSectionTitle(title, hint) {
            return `
                <div class="section-title">
                    <h3>${escapeHtml(title)}</h3>
                    ${hint ? `<div class="hint">${escapeHtml(hint)}</div>` : ''}
                </div>
            `;
        }

        function renderMemoryEntries(entries) {
            const list = Array.isArray(entries) ? entries : [];
            if (!list.length) return '<div class="muted">No memory entries matched the current query.</div>';
            return list.map(entry => `
                <div class="memory-entry">
                    <div class="memory-title">${escapeHtml(entry.title || 'Untitled')}</div>
                    <div class="memory-snippet">${escapeHtml(entry.excerpt || 'No excerpt available.')}</div>
                    <div class="muted">${escapeHtml(formatTimestamp(entry.updatedAt))} · ${escapeHtml(entry.path || '')}</div>
                </div>
            `).join('');
        }

        function renderLimitBar(metric) {
            const pct = Number(metric?.percent || 0);
            const width = Math.min(100, pct);
            const fillClass = pct >= 85 ? 'warn' : '';
            return `
                <div class="progress-row">
                    <div class="progress-meta">
                        <span>${escapeHtml(metric.label || metric.key)}</span>
                        <span>${escapeHtml(Number(metric.used || 0).toLocaleString())} / ${escapeHtml(Number(metric.limit || 0).toLocaleString())} · ${pct.toFixed(1)}%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill ${fillClass}" style="width:${width}%"></div>
                    </div>
                    <div class="progress-meta">
                        <span>Reset ${escapeHtml(formatTimeUntil(metric.resetAt))}</span>
                        <span>Estimated cost $${escapeHtml(Number(metric.costUsd || 0).toFixed(2))}</span>
                    </div>
                </div>
            `;
        }

        function renderAlerts(alerts) {
            const items = Array.isArray(alerts) ? alerts : [];
            if (!items.length) return '<div class="muted">No active alerts.</div>';
            return items.map(alert => {
                const severityClass = alert.severity === 'critical' ? 'bad' : alert.severity === 'warning' ? 'warn' : 'good';
                return `
                    <div class="alert-item ${escapeHtml(alert.severity || 'info')}">
                        <div class="alert-head">
                            <div class="alert-title">${escapeHtml(alert.title || 'Alert')}</div>
                            <div class="pill ${severityClass}">${escapeHtml(alert.type || 'notice')}</div>
                        </div>
                        <div class="alert-detail">${escapeHtml(alert.detail || '')}</div>
                    </div>
                `;
            }).join('');
        }

        function renderTimeline(days) {
            const items = Array.isArray(days) ? days : [];
            if (!items.length) return '<div class="muted">No timeline data available.</div>';
            return items.map(day => `
                <div class="timeline-day">
                    <div>
                        <div class="date">${escapeHtml(day.label || day.date || 'Day')}</div>
                        <div class="status ${escapeHtml(day.status || 'idle')}">${escapeHtml(day.status || 'idle')}</div>
                    </div>
                    <div>
                        <div class="timeline-events">${escapeHtml((day.events || []).join(' · ') || 'No events')}</div>
                        <div class="muted" style="margin-top:0.4rem;">
                            ${escapeHtml(day.sessions || 0)} sessions · ${escapeHtml(day.failedSessions || 0)} failed · score ${escapeHtml(day.score || 0)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSessions(sessions) {
            const items = Array.isArray(sessions) ? sessions : [];
            if (!items.length) return '<div class="muted">No active sessions found.</div>';
            return items.map(session => `
                <div class="session-item">
                    <div class="session-main">
                        <div class="session-name">${escapeHtml(session.id || 'unknown')}</div>
                        <div class="session-sub">
                            ${escapeHtml(session.agentId || 'agent')} · ${escapeHtml(session.status || 'unknown')} · ${escapeHtml(session.toolCount || 0)} tools · ${escapeHtml(formatRelativeTime(session.updatedAt))}
                        </div>
                        <div class="session-sub">${escapeHtml(session.model || 'unknown model')} · ${escapeHtml(session.channel || 'unknown channel')}</div>
                    </div>
                    <div class="session-actions">
                        <span class="pill ${String(session.status || '').includes('fail') ? 'bad' : 'good'}">${escapeHtml(session.status || 'unknown')}</span>
                        <button class="btn" onclick="killSession('${escapeHtml(session.id)}')">Kill</button>
                    </div>
                </div>
            `).join('');
        }

        function renderSandboxOutput(output) {
            if (!output) {
                return '<div class="muted">Run a sandbox test to preview mock results here.</div>';
            }
            return `<div class="sandbox-output">${escapeHtml(output)}</div>`;
        }

        async function loadData(options = {}) {
            const silent = !!options.silent;
            if (!silent) {
                document.getElementById('content').innerHTML = '<div class="loading">Loading your OpenClaw configuration...</div>';
            }
            setHeaderStatus('Syncing...', 'warn');

            try {
                const [status, models, plugins, skills, cron, agentsResp, sessions, limits, timeline, memory, usage] = await Promise.all([
                    apiJson('/api/status'),
                    apiJson('/api/models'),
                    apiJson('/api/plugins'),
                    apiJson('/api/skills'),
                    apiJson('/api/cron'),
                    apiJson('/api/agents'),
                    apiJson('/api/sessions/active'),
                    apiJson('/api/limits'),
                    apiJson('/api/health/timeline'),
                    apiJson(`/api/memory?q=${encodeURIComponent(dashboardData.memoryQuery || '')}`),
                    apiJson('/api/usage')
                ]);

                dashboardData = {
                    status,
                    models,
                    plugins,
                    skills,
                    cron,
                    agents: Array.isArray(agentsResp?.agents) ? agentsResp.agents : [],
                    sessionsActive: sessions,
                    memory,
                    limits,
                    timeline,
                    usage,
                    alerts: Array.isArray(limits?.alerts) ? limits.alerts : Array.isArray(timeline?.alerts) ? timeline.alerts : [],
                    memoryQuery: dashboardData.memoryQuery || '',
                    sandboxWebQuery: dashboardData.sandboxWebQuery || '',
                    sandboxExecCommand: dashboardData.sandboxExecCommand || 'node -v',
                    ready: true
                };

                setHeaderStatus('Live', 'good');
                renderActiveView();
                renderSettings(models, plugins);
                if (!silent && dashboardData.alerts.length) {
                    showToast(`${dashboardData.alerts.length} alert${dashboardData.alerts.length === 1 ? '' : 's'} detected`, dashboardData.alerts.some(alert => alert.severity === 'critical') ? 'error' : 'info');
                }
            } catch (e) {
                setHeaderStatus('API error', 'error');
                if (!silent) {
                    document.getElementById('content').innerHTML = `<div class="error">Failed to load: ${escapeHtml(e.message)}</div>`;
                }
                showToast(`Load failed: ${e.message}`, 'error');
            }
        }

        function renderUsageCard(usage, limits) {
            if (!usage) return '<div class="card"><h2>Token Usage</h2><div class="muted">No data available</div></div>';
            const today = usage.today || {};
            const days = usage.days || [];
            const totalToday = usage.totalToday || 0;
            const cacheHitRate = usage.cacheHitRate || 0;
            const fmt = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n||0);
            const pct = (a, b) => b > 0 ? Math.round(a/b*100) : 0;
            const cacheIn = today.cacheRead || 0;
            const cacheCreation = today.cacheCreation || 0;
            const inputTokens = today.inputTokens || 0;
            const outputTokens = today.outputTokens || 0;
            const maxDay = Math.max(...days.map(d => d.total || 0), 1);
            const barsHtml = days.map(d => {
                const h = Math.max(4, Math.round((d.total / maxDay) * 60));
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;" title="${d.date}: ${fmt(d.total)} tokens">
                    <div style="width:100%;background:#2a2d3e;border-radius:3px;height:60px;display:flex;align-items:flex-end;">
                        <div style="width:100%;height:${h}px;background:#00d4aa;border-radius:3px;opacity:0.85;"></div>
                    </div>
                    <div style="font-size:0.6rem;color:#666;">${d.date.slice(5)}</div>
                </div>`;
            }).join('');
            return `<div class="card">
                ${renderSectionTitle('Token Usage', 'Today\'s consumption + 7-day trend')}
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;">
                    <div class="info-row"><span class="info-label">Total today</span><span class="info-value">${fmt(totalToday)}</span></div>
                    <div class="info-row"><span class="info-label">Cache hit rate</span><span class="info-value" style="color:#00d4aa;">${cacheHitRate}%</span></div>
                    <div class="info-row"><span class="info-label">Input</span><span class="info-value">${fmt(inputTokens)}</span></div>
                    <div class="info-row"><span class="info-label">Output</span><span class="info-value">${fmt(outputTokens)}</span></div>
                    <div class="info-row"><span class="info-label">Cache reads</span><span class="info-value" style="color:#7c83ff;">${fmt(cacheIn)}</span></div>
                    <div class="info-row"><span class="info-label">Cache writes</span><span class="info-value">${fmt(cacheCreation)}</span></div>
                    <div class="info-row"><span class="info-label">Messages today</span><span class="info-value">${today.messages || 0}</span></div>
                    <div class="info-row" style="grid-column:1/-1;"><span class="info-label">Limit resets</span><span class="info-value" style="color:#ffd166;">${escapeHtml(formatTimestamp(limits?.resetAt))}</span></div>
                </div>
                <div style="font-size:0.72rem;color:#888;margin-bottom:0.4rem;">7-day trend</div>
                <div style="display:flex;gap:4px;align-items:flex-end;height:80px;">${barsHtml}</div>
            </div>`;
        }

        function renderDashboard(status, models, plugins, skills, cron, sessions, memory, limits, timeline, alerts, usage) {
            const content = document.getElementById('content');
            const agent = status.agent || {};
            const system = status.system || {};
            const sessionList = sessions?.sessions || [];
            const memoryEntries = memory?.entries || [];
            const memoryRecent = memory?.recent || [];
            const metrics = limits?.metrics || [];
            const days = timeline?.days || [];
            const items = alerts || [];

            const cronJobsHtml = (cron.jobs || []).slice(0, 8).map(j => {
                const scheduleExpr = j?.schedule?.expr || j.schedule || 'No schedule';
                const state = j.state || {};
                const statusText = state.lastRunStatus || 'unknown';
                return `
                    <div class="cron-job">
                        <div class="cron-head">
                            <div class="cron-name">${escapeHtml(j.name || 'Unnamed')}</div>
                            <div class="cron-status ${cronStatusClass(statusText)}">${escapeHtml(statusText)}</div>
                        </div>
                        <div class="cron-desc">${escapeHtml(j.description || 'No description')}</div>
                        <div class="cron-meta">
                            <div class="k">Schedule</div><div class="v">${escapeHtml(scheduleExpr)}</div>
                            <div class="k">Last run</div><div class="v">${escapeHtml(formatTimestamp(state.lastRunAtMs))}</div>
                            <div class="k">Next run</div><div class="v">${escapeHtml(formatTimestamp(state.nextRunMs))}</div>
                        </div>
                    </div>
                `;
            }).join('') || '<div style="color: #888;">No cron jobs configured</div>';

            content.innerHTML = `
                <div class="panel-stack">
                    <div class="grid">
                        <div class="card">
                            <h2>Agent Status</h2>
                            <div class="info-row"><span class="info-label">Name</span><span class="info-value">${escapeHtml(agent.name || 'Unknown')}</span></div>
                            <div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:#00d4aa;">${escapeHtml(agent.status || 'Unknown')}</span></div>
                            <div class="info-row"><span class="info-label">Current Model</span><span class="info-value">${escapeHtml((agent.model || 'Unknown').split('/').pop())}</span></div>
                            <div class="info-row"><span class="info-label">Default Model</span><span class="info-value">${escapeHtml((agent.defaultModel || 'Unknown').split('/').pop())}</span></div>
                            <div class="info-row"><span class="info-label">Total Agents</span><span class="info-value">${escapeHtml(agent.totalAgents || 0)}</span></div>
                            <div class="info-row"><span class="info-label">Memory Files</span><span class="info-value">${escapeHtml(agent.memoryFiles || 0)}</span></div>
                        </div>

                        <div class="card">
                            <h2>System</h2>
                            <div class="info-row"><span class="info-label">OpenClaw</span><span class="info-value">${escapeHtml(system.openclawVersion || 'Unknown')}</span></div>
                            <div class="info-row"><span class="info-label">Gateway Port</span><span class="info-value">${escapeHtml(system.gatewayPort || 'Unknown')}</span></div>
                            <div class="info-row"><span class="info-label">Gateway</span><span class="info-value" style="color:${system.gatewayConnected ? '#00d4aa' : '#ff6464'}">${system.gatewayConnected ? 'Connected' : 'Disconnected'}</span></div>
                            <div class="info-row"><span class="info-label">Cron Jobs</span><span class="info-value">${escapeHtml(system.cronJobs || 0)}</span></div>
                            <div class="info-row"><span class="info-label">Workspace</span><span class="info-value" style="font-size:0.75rem;">${escapeHtml(agent.workspace || 'Unknown')}</span></div>
                        </div>

                        <div class="card">
                            <h2>Configured Models (${models.length})</h2>
                            <div style="padding:0.5rem 0;">
                                ${models.map(m => `<span class="model-tag ${m.isDefault ? 'default' : ''}">${escapeHtml(m.name)}${m.isDefault ? ' (Default)' : ''}</span>`).join('')}
                            </div>
                        </div>

                        <div class="card">
                            <h2>Active Plugins (${plugins.length})</h2>
                            <div>
                                ${plugins.slice(0, 10).map(p => `
                                    <div class="skill-item">
                                        <span class="skill-category">Plugin</span>
                                        <span>${escapeHtml(p.name)}</span>
                                        <span style="margin-left:auto;color:${p.enabled ? '#00d4aa' : '#888'};">${p.enabled ? '✓' : '✗'}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="card">
                            <h2>Skills (${skills.length})</h2>
                            <div style="max-height:300px;overflow-y:auto;">
                                ${skills.slice(0, 20).map(s => `
                                    <div class="skill-item">
                                        <span class="skill-category ${(s.category || '').toLowerCase()}">${escapeHtml(s.category)}</span>
                                        <span title="${escapeHtml(s.description || '')}">${escapeHtml(s.name)}</span>
                                    </div>
                                `).join('')}
                                ${skills.length > 20 ? `<div style="text-align:center;color:#888;padding:0.5rem;">...and ${skills.length - 20} more</div>` : ''}
                            </div>
                        </div>

                        <div class="card">
                            <h2>Cron Jobs (${cron.count || 0})</h2>
                            <div>${cronJobsHtml}</div>
                        </div>

                        <div class="card">
                            ${renderSectionTitle('Operations Panel', 'Safe, mock-only actions with live session controls')}
                            <div style="margin-bottom:0.9rem;">
                                <div class="action-grid">
                                    <button class="btn action-btn neutral" onclick="runAction('restart-gateway')"><span class="label">Restart Gateway</span><span class="meta">Recycle the gateway listener safely.</span></button>
                                    <button class="btn action-btn neutral" onclick="runAction('kill-session', dashboardData.sessionsActive?.sessions?.[0]?.id)"><span class="label">Kill Session</span><span class="meta">Use the most recent active session as the target.</span></button>
                                    <button class="btn action-btn neutral" onclick="runAction('backup')"><span class="label">Backup</span><span class="meta">Simulate a workspace backup snapshot.</span></button>
                                    <button class="btn action-btn neutral" onclick="runAction('clear-cache')"><span class="label">Clear Cache</span><span class="meta">Preview a non-destructive cache flush.</span></button>
                                    <button class="btn action-btn danger" onclick="runAction('emergency-stop-all')"><span class="label">Emergency Stop All</span><span class="meta">Mock safety lock for every active process.</span></button>
                                </div>
                            </div>
                            ${renderSectionTitle('Tool Sandbox', 'Read-only test harness for search and command previews')}
                            <div class="sandbox-grid">
                                <div>
                                    <div class="input-row">
                                        <input id="sandboxWebQuery" class="field" type="text" placeholder="Search query" value="${escapeHtml(dashboardData.sandboxWebQuery || '')}">
                                        <button class="btn primary" onclick="runSandboxWebSearch()">Web search</button>
                                    </div>
                                    <div class="input-row">
                                        <input id="sandboxExecCommand" class="field" type="text" placeholder="Command preview" value="${escapeHtml(dashboardData.sandboxExecCommand || 'node -v')}">
                                        <button class="btn" onclick="runSandboxExec()">Exec test</button>
                                    </div>
                                </div>
                                ${renderSandboxOutput(sandboxOutput)}
                            </div>
                        </div>

                        <div class="card">
                            ${renderSectionTitle('Live Session Monitor', `${sessionList.length} active or recent sessions`)}
                            <div class="session-list">${renderSessions(sessionList)}</div>
                        </div>

                        <div class="card">
                            ${renderSectionTitle('Memory Browser', `${memory?.count || 0} matches · ${memory?.recentCount || 0} recent files`)}
                            <div class="input-row">
                                <input id="memorySearchInput" class="field" type="text" placeholder="Search memory files" value="${escapeHtml(memory?.query || dashboardData.memoryQuery || '')}" oninput="queueMemorySearch(this.value)">
                                <button class="btn primary" onclick="searchMemoryNow()">Search</button>
                            </div>
                            <div class="search-results">${renderMemoryEntries(memoryEntries.length ? memoryEntries : memoryRecent)}</div>
                        </div>

                        <div class="card">
                            ${renderSectionTitle('Rate Limit Visualizer', limits?.rateWindow?.label || 'Rolling window')}
                            <div class="progress-list">${metrics.map(renderLimitBar).join('')}</div>
                            <div style="margin-top:0.9rem;" class="muted">
                                Next reset estimate: ${escapeHtml(formatTimestamp(limits?.resetAt))}
                                ${limits?.disk ? ` · Disk usage ${escapeHtml(Number(limits.disk.percentUsed || 0).toFixed(1))}% on ${escapeHtml(limits.disk.path)}` : ''}
                            </div>
                        </div>

                        <div class="card">
                            ${renderSectionTitle('System Health Timeline', 'Past 7 days of health, sessions, and memory activity')}
                            <div class="timeline-list">${renderTimeline(days)}</div>
                        </div>

                        <div class="card">
                            ${renderSectionTitle('Notifications / Alerts', `${items.length} current alert${items.length === 1 ? '' : 's'}`)}
                            <div class="alert-list">${renderAlerts(items)}</div>
                        </div>

                        ${renderUsageCard(usage, limits)}
                    </div>
                </div>
            `;
        }

        function renderAgentsPage(agents) {
            const content = document.getElementById('content');
            const cards = (agents || []).map(a => {
                const security = a.security || {};
                const health = a.health || {};
                const tools = Array.isArray(a.tools) ? a.tools : [];
                const modelName = (a.model || 'unknown').split('/').pop();
                return `
                    <div class="agent-card">
                        <div class="agent-top">
                            <div>
                                <div class="agent-name">${escapeHtml(a.name || a.id)}</div>
                                <div style="font-size:0.76rem;color:#9094a8;">id: ${escapeHtml(a.id || 'unknown')}</div>
                            </div>
                            <div style="display:flex;gap:0.45rem;align-items:center;">
                                <span class="health-badge ${escapeHtml(health.status || 'unknown')}">${escapeHtml(health.status || 'unknown')}</span>
                                <span class="risk ${escapeHtml(security.level || 'low')}">${escapeHtml(security.level || 'low')} risk</span>
                            </div>
                        </div>
                        <div class="info-row"><span class="info-label">Model</span><span class="info-value">${escapeHtml(modelName)}</span></div>
                        <div class="info-row"><span class="info-label">Workspace</span><span class="info-value" style="font-size:0.75rem;">${escapeHtml(a.workspace || 'Unknown')}</span></div>
                        <div class="info-row"><span class="info-label">Agent dir</span><span class="info-value" style="font-size:0.75rem;">${escapeHtml(a.agentDir || 'Unknown')}</span></div>
                        <div class="info-row"><span class="info-label">Last session</span><span class="info-value">${escapeHtml(formatTimestamp(health.lastSessionAtMs))}</span></div>
                        <div class="info-row"><span class="info-label">Last run status</span><span class="info-value">${escapeHtml(health.lastRunStatus || 'unknown')}</span></div>
                        <div class="info-row"><span class="info-label">Runtime</span><span class="info-value">${health.runtimeMs ? `${Math.round(health.runtimeMs / 1000)}s` : 'N/A'}</span></div>
                        <div class="info-row"><span class="info-label">Session errors</span><span class="info-value" style="color:${health.errorCount ? '#ff8b8b' : '#00d4aa'};">${escapeHtml(health.errorCount ?? 0)}</span></div>
                        <div style="margin-top:0.65rem;font-size:0.82rem;color:#b9c2d3;">
                            Security: sandbox <b>${escapeHtml(security.sandboxMode || 'unknown')}</b>, elevated exec <b>${security.canRequestElevated ? 'yes' : 'no'}</b>, external comm <b>${security.canExternalComm ? 'yes' : 'no'}</b>
                        </div>
                        <div style="margin-top:0.45rem;">
                            ${(security.highRiskTools || []).slice(0, 12).map(t => `<span class="tool-chip">${escapeHtml(t)}</span>`).join('') || '<span style="color:#8f93a8;font-size:0.8rem;">No high-risk tools detected</span>'}
                        </div>
                        <div style="margin-top:0.55rem;color:#98a0b6;font-size:0.75rem;">Tools (${tools.length})</div>
                        <div>
                            ${tools.slice(0, 18).map(t => `<span class="tool-chip">${escapeHtml(t)}</span>`).join('') || '<span style="color:#8f93a8;font-size:0.8rem;">No tool metadata</span>'}
                            ${tools.length > 18 ? `<span style="color:#8f93a8;font-size:0.78rem;">+${tools.length - 18} more</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `
                <div class="card" style="margin-bottom:1rem;">
                    <h2>Agents Overview (${agents.length})</h2>
                    <div style="color:#98a0b6;font-size:0.85rem;line-height:1.4;">
                        Data source: <code>~/.openclaw/agents/</code> session metadata and configured agent properties.
                    </div>
                </div>
                <div class="agent-grid">
                    ${cards || '<div class="card"><div style="color:#888;">No agents found.</div></div>'}
                </div>
            `;
        }

        function renderSettings(models, plugins) {
            const modelSelect = document.getElementById('defaultModelSelect');
            const defaultModel = models.find(m => m.isDefault)?.id;
            modelSelect.innerHTML = models.map(m => `
                <option value="${escapeHtml(m.id)}" ${m.id === defaultModel ? 'selected' : ''}>${escapeHtml(m.id)}</option>
            `).join('');

            const pluginList = document.getElementById('pluginToggleList');
            pluginList.innerHTML = plugins.map(p => `
                <div class="plugin-row">
                    <div>
                        <div style="font-size:0.9rem;color:#fff;">${escapeHtml(p.name)}</div>
                        <div style="font-size:0.75rem;color:#8f8f9f;">${escapeHtml(p.description || 'Plugin integration')}</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" data-plugin="${escapeHtml(p.name)}" ${p.enabled ? 'checked' : ''} onchange="togglePluginByInput(this)">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('') || '<div style="color:#888;">No plugins found</div>';
        }

        async function runAction(action, sessionId) {
            try {
                const payload = sessionId ? { sessionId } : {};
                const data = await apiJson(`/api/actions/${encodeURIComponent(action)}`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                showToast(data.message || `${action} completed`, 'success');
                await loadData({ silent: true });
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function killSession(sessionId) {
            if (!sessionId) {
                showToast('No session id available to kill.', 'error');
                return;
            }
            try {
                const data = await apiJson(`/api/sessions/${encodeURIComponent(sessionId)}/kill`, {
                    method: 'POST',
                    body: JSON.stringify({ reason: 'dashboard-request' })
                });
                showToast(data.message || `Session ${sessionId} handled`, 'success');
                await loadData({ silent: true });
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function queueMemorySearch(value) {
            dashboardData.memoryQuery = value;
            if (memorySearchTimer) clearTimeout(memorySearchTimer);
            memorySearchTimer = setTimeout(() => searchMemoryNow(true), 350);
        }

        async function searchMemoryNow(silent = false) {
            const input = document.getElementById('memorySearchInput');
            const query = String(input?.value || dashboardData.memoryQuery || '').trim();
            dashboardData.memoryQuery = query;
            try {
                const memory = await apiJson(`/api/memory?q=${encodeURIComponent(query)}`);
                dashboardData.memory = memory;
                renderActiveView();
                if (!silent) {
                    showToast(query ? `Memory search completed for "${query}"` : 'Recent memory loaded', 'success');
                }
            } catch (e) {
                if (!silent) showToast(e.message, 'error');
            }
        }

        async function runSandboxWebSearch() {
            const input = document.getElementById('sandboxWebQuery');
            const query = String(input?.value || '').trim();
            dashboardData.sandboxWebQuery = query;
            try {
                const data = await apiJson('/api/sandbox/web-search', {
                    method: 'POST',
                    body: JSON.stringify({ query })
                });
                sandboxOutput = JSON.stringify(data, null, 2);
                renderActiveView();
                showToast('Sandbox web search completed', 'success');
            } catch (e) {
                sandboxOutput = `Error: ${e.message}`;
                renderActiveView();
                showToast(e.message, 'error');
            }
        }

        async function runSandboxExec() {
            const input = document.getElementById('sandboxExecCommand');
            const command = String(input?.value || '').trim();
            dashboardData.sandboxExecCommand = command;
            try {
                const data = await apiJson('/api/sandbox/exec', {
                    method: 'POST',
                    body: JSON.stringify({ command })
                });
                sandboxOutput = JSON.stringify(data, null, 2);
                renderActiveView();
                showToast(data.message || 'Sandbox exec completed', data.success ? 'success' : 'error');
            } catch (e) {
                sandboxOutput = `Error: ${e.message}`;
                renderActiveView();
                showToast(e.message, 'error');
            }
        }

        async function saveDefaultModel() {
            const modelId = document.getElementById('defaultModelSelect').value;
            if (!modelId) return;
            try {
                const data = await apiJson('/api/settings/model', {
                    method: 'POST',
                    body: JSON.stringify({ modelId })
                });
                showSettingsMessage('Default model updated successfully.');
                showToast(`Default model set to ${data.modelId}`, 'success');
                await loadData({ silent: true });
            } catch (e) {
                showSettingsMessage(e.message, true);
                showToast(e.message, 'error');
            }
        }

        function togglePluginByInput(input) {
            const pluginName = input?.dataset?.plugin || '';
            return togglePlugin(pluginName, !!input.checked);
        }

        async function togglePlugin(pluginName, enabled) {
            try {
                const data = await apiJson('/api/settings/plugin', {
                    method: 'POST',
                    body: JSON.stringify({ pluginName, enabled })
                });
                showSettingsMessage(`${pluginName} ${enabled ? 'enabled' : 'disabled'}.`);
                showToast(`${data.pluginName} ${enabled ? 'enabled' : 'disabled'}`, 'success');
                await loadData({ silent: true });
            } catch (e) {
                showSettingsMessage(e.message, true);
                showToast(e.message, 'error');
            }
        }

        function openSettings() {
            showSettingsMessage('');
            document.getElementById('settingsOverlay').classList.add('open');
        }

        function closeSettings(event) {
            if (!event || event.target.id === 'settingsOverlay') {
                document.getElementById('settingsOverlay').classList.remove('open');
            }
        }

        async function loadActivity() {
            try {
                activityData = await apiJson('/api/activity');
                if (currentView === 'activity') renderActivityPage(activityData);
            } catch (e) {
                activityData = { error: e.message };
                if (currentView === 'activity') renderActivityPage(activityData);
            }
        }

        function startActivityPolling() {
            stopActivityPolling();
            activityPollTimer = setInterval(() => {
                if (document.visibilityState === 'visible') loadActivity().catch(() => {});
            }, 5000);
        }

        function stopActivityPolling() {
            if (activityPollTimer) { clearInterval(activityPollTimer); activityPollTimer = null; }
        }

        function renderActivityPage(data) {
            const content = document.getElementById('content');

            if (!data) {
                content.innerHTML = '<div class="loading">Loading activity data...</div>';
                return;
            }

            if (data.error) {
                content.innerHTML = `<div class="error">Failed to load activity: ${escapeHtml(data.error)}</div>`;
                return;
            }

            const botStatus = data.botStatus || 'unknown';
            const activity = data.currentActivity || 'unknown';
            const tmuxAvailable = data.tmuxAvailable !== false;
            const lastMessage = data.lastMessage || null;
            const lastTaskSummary = data.lastTaskSummary || null;
            const rawLines = Array.isArray(data.rawLines) ? data.rawLines : [];
            const checkedAt = data.checkedAt ? new Date(data.checkedAt).toLocaleTimeString() : 'unknown';

            const activityLabel = { idle: 'Idle', thinking: 'Thinking...', working: 'Working', unknown: 'Unknown' }[activity] || activity;

            content.innerHTML = `
                <div class="activity-grid">
                    <div class="card">
                        <h2>Bot Status</h2>
                        <div class="activity-status-row">
                            <div class="activity-dot ${escapeHtml(botStatus)}"></div>
                            <div class="activity-label">Process</div>
                            <div class="activity-value ${escapeHtml(botStatus)}">${botStatus === 'alive' ? 'Alive' : 'Dead'}</div>
                        </div>
                        <div class="activity-status-row">
                            <div class="activity-dot ${escapeHtml(activity)}"></div>
                            <div class="activity-label">Activity</div>
                            <div class="activity-value ${escapeHtml(activity)}">${escapeHtml(activityLabel)}</div>
                        </div>
                        <div class="activity-status-row">
                            <div class="activity-dot ${tmuxAvailable ? 'alive' : 'dead'}"></div>
                            <div class="activity-label">tmux session</div>
                            <div class="activity-value ${tmuxAvailable ? 'alive' : 'dead'}">${tmuxAvailable ? 'claude-telegram' : 'Not found'}</div>
                        </div>
                        <div class="activity-refresh-note">Last checked: ${escapeHtml(checkedAt)} · polls every 5s</div>
                    </div>

                    <div class="card">
                        <h2>Last Message Received</h2>
                        ${lastMessage
                            ? `<div class="activity-message-box">${escapeHtml(lastMessage)}</div>`
                            : `<div class="activity-message-box empty">No telegram message found in recent output</div>`
                        }
                    </div>

                    <div class="card" style="grid-column: 1 / -1;">
                        <h2>Last Task Summary</h2>
                        ${lastTaskSummary
                            ? `<div class="activity-message-box">${escapeHtml(lastTaskSummary)}</div>`
                            : `<div class="activity-message-box empty">No recent task output available</div>`
                        }
                    </div>

                    <div class="card" style="grid-column: 1 / -1;">
                        <h2>Raw tmux Output (last 30 lines)</h2>
                        ${tmuxAvailable && rawLines.length
                            ? `<div class="activity-tmux-output">${escapeHtml(rawLines.join('\n'))}</div>`
                            : `<div class="activity-message-box empty">tmux session "claude-telegram" not available</div>`
                        }
                    </div>
                </div>
            `;
        }

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(() => {
                if (document.visibilityState === 'visible') {
                    loadData({ silent: true }).catch(() => {});
                }
            }, 20000);
        }

        loadData().then(() => startPolling());
    </script>
</body>
</html>
